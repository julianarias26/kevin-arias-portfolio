<!-- ══════════════════════════════════════════════════
     VARIANTE DESKTOP — botón compacto con flip animado
     ══════════════════════════════════════════════════ -->
@if (variant === 'desktop') {
  <button
    (click)="toggle()"
    (mouseenter)="hovered.set(true)"
    (mouseleave)="hovered.set(false)"
    class="relative inline-flex items-center gap-2
           px-2.5 py-1.5 rounded-md cursor-pointer
           border-none transition-all duration-300 overflow-hidden group"
    [style.background]="hovered()
      ? 'rgba(255,255,255,0.07)'
      : 'rgba(255,255,255,0.03)'"
    [style.box-shadow]="hovered()
      ? 'inset 0 0 0 1px rgba(14,165,233,0.35), 0 0 12px rgba(14,165,233,0.08)'
      : 'inset 0 0 0 1px rgba(255,255,255,0.08)'"
    style="backdrop-filter: blur(8px);">

    <!-- Bandera activa + código + separador + bandera inactiva -->
    <div class="flex items-center gap-1.5">

      <!-- Bandera del idioma ACTIVO — más grande -->
      <div class="relative flex-shrink-0 overflow-hidden rounded-sm
                  transition-all duration-300"
           style="width:20px; height:14px;">
        @if (langService.isEn()) {
          <!-- UK flag SVG -->
          <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"
               style="width:100%;height:100%">
            <rect width="60" height="40" fill="#012169"/>
            <path d="M0,0 L60,40 M60,0 L0,40" stroke="#fff" stroke-width="8"/>
            <path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="4.5"/>
            <path d="M30,0 V40 M0,20 H60" stroke="#fff" stroke-width="13"/>
            <path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="8"/>
          </svg>
        } @else {
          <!-- Spain flag SVG -->
          <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"
               style="width:100%;height:100%">
            <rect width="60" height="40" fill="#c60b1e"/>
            <rect y="10" width="60" height="20" fill="#ffc400"/>
          </svg>
        }
      </div>

      <!-- Código idioma activo -->
      <span class="font-mono text-[11px] font-semibold tracking-widest
                   transition-colors duration-200 leading-none"
            [style.color]="hovered() ? '#e2e8f0' : '#94a3b8'">
        {{ langService.isEn() ? 'EN' : 'ES' }}
      </span>

      <!-- Separador vertical -->
      <span style="width:1px; height:14px; background:rgba(255,255,255,0.1);
                   display:block; flex-shrink:0;">
      </span>

      <!-- Bandera del idioma INACTIVO — más pequeña, opaca -->
      <div class="relative flex-shrink-0 overflow-hidden rounded-sm
                  transition-all duration-300"
           style="width:16px; height:11px; opacity:0.35;">
        @if (langService.isEn()) {
          <!-- Spain flag (inactivo) -->
          <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"
               style="width:100%;height:100%">
            <rect width="60" height="40" fill="#c60b1e"/>
            <rect y="10" width="60" height="20" fill="#ffc400"/>
          </svg>
        } @else {
          <!-- UK flag (inactivo) -->
          <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"
               style="width:100%;height:100%">
            <rect width="60" height="40" fill="#012169"/>
            <path d="M0,0 L60,40 M60,0 L0,40" stroke="#fff" stroke-width="8"/>
            <path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="4.5"/>
            <path d="M30,0 V40 M0,20 H60" stroke="#fff" stroke-width="13"/>
            <path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="8"/>
          </svg>
        }
      </div>

      <!-- Código idioma inactivo -->
      <span class="font-mono text-[10px] tracking-widest leading-none"
            style="color:#334155">
        {{ langService.isEn() ? 'ES' : 'EN' }}
      </span>

    </div>

    <!-- Flecha indicadora -->
    <span data-icon="heroicons:arrows-right-left"
          class="iconify w-3 h-3 transition-all duration-300 flex-shrink-0"
          [style.color]="hovered() ? '#0ea5e9' : '#1e2d42'"
          [style.transform]="hovered() ? 'rotate(180deg)' : 'rotate(0deg)'">
    </span>

    <!-- Glow de fondo en hover -->
    <div class="absolute inset-0 pointer-events-none transition-opacity duration-300
                rounded-md"
         [style.opacity]="hovered() ? '1' : '0'"
         style="background: radial-gradient(ellipse at center,
                  rgba(14,165,233,0.06) 0%, transparent 70%);">
    </div>

  </button>
}

<!-- ══════════════════════════════════════════════════
     VARIANTE MOBILE — fila expandida en el menú móvil
     ══════════════════════════════════════════════════ -->
@if (variant === 'mobile') {
  <div class="flex items-center gap-3 px-4 py-3">

    <!-- Label -->
    <span class="font-mono text-[10px] uppercase tracking-widest flex-shrink-0"
          style="color:#334155">
      Language
    </span>

    <!-- Toggle pill -->
    <div class="flex items-center rounded-md overflow-hidden flex-1"
         style="border: 1px solid rgba(255,255,255,0.06);
                background: rgba(0,0,0,0.2);">

      <!-- Opción EN -->
      <button
        (click)="langService.setLang('en')"
        class="flex items-center justify-center gap-2 flex-1 py-2.5
               cursor-pointer border-none transition-all duration-200"
        [style.background]="langService.isEn()
          ? 'rgba(14,165,233,0.15)' : 'transparent'">

        <div class="overflow-hidden rounded-sm flex-shrink-0"
             style="width:20px; height:14px;">
          <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"
               style="width:100%;height:100%">
            <rect width="60" height="40" fill="#012169"/>
            <path d="M0,0 L60,40 M60,0 L0,40" stroke="#fff" stroke-width="8"/>
            <path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="4.5"/>
            <path d="M30,0 V40 M0,20 H60" stroke="#fff" stroke-width="13"/>
            <path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="8"/>
          </svg>
        </div>

        <span class="font-mono text-[11px] font-semibold tracking-widest"
              [style.color]="langService.isEn() ? '#e2e8f0' : '#334155'">
          EN
        </span>

        @if (langService.isEn()) {
          <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                style="background:#0ea5e9;
                       box-shadow: 0 0 6px rgba(14,165,233,0.7)">
          </span>
        }
      </button>

      <!-- Divisor -->
      <div style="width:1px; height:28px; background:rgba(255,255,255,0.06);
                  flex-shrink:0;">
      </div>

      <!-- Opción ES -->
      <button
        (click)="langService.setLang('es')"
        class="flex items-center justify-center gap-2 flex-1 py-2.5
               cursor-pointer border-none transition-all duration-200"
        [style.background]="langService.isEs()
          ? 'rgba(14,165,233,0.15)' : 'transparent'">

        <div class="overflow-hidden rounded-sm flex-shrink-0"
             style="width:20px; height:14px;">
          <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg"
               style="width:100%;height:100%">
            <rect width="60" height="40" fill="#c60b1e"/>
            <rect y="10" width="60" height="20" fill="#ffc400"/>
          </svg>
        </div>

        <span class="font-mono text-[11px] font-semibold tracking-widest"
              [style.color]="langService.isEs() ? '#e2e8f0' : '#334155'">
          ES
        </span>

        @if (langService.isEs()) {
          <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                style="background:#0ea5e9;
                       box-shadow: 0 0 6px rgba(14,165,233,0.7)">
          </span>
        }
      </button>

    </div>
  </div>
}
