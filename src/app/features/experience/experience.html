<section id="experience"
  class="section-padding bg-surface-card border-y border-surface-border">

  <div class="mb-16">
    <p class="section-label">03 / Experience</p>
    <h2 class="section-title">
      Professional <span class="text-surface-muted">Journey</span>
    </h2>
  </div>

  <!-- Timeline -->
  <div class="relative">
    <!-- Vertical line -->
    <div class="absolute left-0 top-2 bottom-0 w-px bg-surface-border"></div>

    @for (exp of experiences; track exp.id) {
      <div appScrollAnimate class="relative pl-9 mb-14 last:mb-0">

        <!-- Dot -->
        <div class="absolute left-[-6px] top-2 w-[13px] h-[13px] rounded-full border-2 transition-colors"
             [class]="exp.current
               ? 'bg-primary border-primary shadow-[0_0_0_4px_rgba(14,165,233,0.15)]'
               : 'bg-surface-card border-primary'">
        </div>

        <!-- Header -->
        <div class="flex flex-wrap justify-between items-start gap-2 mb-1.5">
          <h3 class="font-sans font-bold text-xl text-white"
              style="font-family:'Syne',sans-serif">
            {{ exp.role }}
          </h3>
          <span class="font-mono text-xs text-primary bg-primary/[0.08]
                       border border-primary/20 px-2.5 py-1 rounded-sm whitespace-nowrap">
            {{ exp.period }}
          </span>
        </div>

        <p class="text-sm text-slate-400 mb-4">{{ exp.company }} · Full-time</p>

        <p class="text-sm text-slate-400 leading-[1.75] mb-4">{{ exp.description }}</p>

        <!-- Highlights -->
        <ul class="mb-5 space-y-0">
          @for (h of exp.highlights; track h) {
            <li class="flex gap-2.5 text-[13px] text-slate-400 py-1.5
                       border-b border-surface-border/50 last:border-0">
              <span class="text-primary flex-shrink-0 mt-0.5">→</span>
              {{ h }}
            </li>
          }
        </ul>

        <!-- Stack tags -->
        <div class="flex flex-wrap gap-2">
          @for (tag of exp.stack; track tag) {
            <span class="font-mono text-[11px] text-slate-500
                         bg-surface border border-surface-border px-2.5 py-1 rounded-sm">
              {{ tag }}
            </span>
          }
        </div>
      </div>
    }
  </div>
</section>
