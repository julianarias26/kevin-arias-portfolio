<section id="hero"
  class="min-h-screen flex items-center px-[6%] pt-28 pb-20 relative overflow-hidden">

  <!-- Grid background -->
  <div class="absolute inset-0 bg-grid-pattern bg-grid opacity-100
              [mask-image:radial-gradient(ellipse_80%_80%_at_50%_50%,black_30%,transparent_100%)]">
  </div>

  <!-- Ambient glow -->
  <div class="absolute -top-1/5 -left-[10%] w-[60%] h-[60%]
              bg-[radial-gradient(ellipse,rgba(14,165,233,0.07)_0%,transparent_70%)]
              pointer-events-none">
  </div>

  <div class="relative max-w-3xl animate-fade-in">

    <!-- Status badge -->
    <div class="inline-flex items-center gap-2 font-mono text-xs text-primary
                border border-primary/25 rounded-sm px-4 py-1.5 mb-8
                bg-primary/[0.04]">
      <span class="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></span>
      {{ lang.get('hero.badge') }}
    </div>

    <!-- Name -->
    <h1 class="font-sans text-[clamp(48px,7vw,86px)] font-extrabold leading-none
               tracking-tight text-white mb-3" style="font-family:'Syne',sans-serif">
      {{ lang.get('hero.title1') }}<br>
      <span class="text-primary">{{ lang.get('hero.title2') }}</span>
    </h1>

    <!-- Typewriter -->
    <div class="flex items-center gap-1 mb-8 min-h-[48px]
                text-[clamp(22px,3.5vw,36px)] font-bold text-slate-400"
                style="font-family:'Syne',sans-serif">
      <span>{{ displayText() }}</span>
      <span class="text-primary animate-blink">|</span>
    </div>

    <!-- Description -->
    <p class="text-slate-400 text-base leading-[1.85] max-w-[540px] mb-11
              border-l-2 border-primary pl-5">
      {{ lang.get('hero.description') }}
    </p>

    <!-- CTAs -->
    <div class="flex gap-4 flex-wrap">
      <button (click)="scrollTo('projects')"
        class="inline-flex items-center gap-2 bg-primary text-white font-medium
               text-sm px-7 py-3.5 rounded-sm hover:bg-primary-dark
               hover:-translate-y-px transition-all duration-200">
        {{ lang.get('hero.cta.primary') }}
      </button>
      <button (click)="scrollTo('contact')"
        class="inline-flex items-center gap-2 bg-transparent text-white font-medium
               text-sm px-7 py-3 rounded-sm border border-surface-border
               hover:border-primary hover:text-primary hover:-translate-y-px
               transition-all duration-200">
        {{ lang.get('hero.cta.secondary') }}
      </button>
    </div>

    <!-- Stats -->
    <div class="flex gap-10 mt-16 pt-10 border-t border-surface-border flex-wrap">
      @for (stat of stats; track stat.label) {
        <div>
          <div class="font-sans text-4xl font-extrabold text-primary leading-none"
               style="font-family:'Syne',sans-serif">
            {{ stat.value }}
          </div>
          <div class="font-mono text-[11px] text-slate-600 mt-1.5 uppercase tracking-widest">
            {{ stat.label }}
          </div>
        </div>
      }
    </div>
  </div>
</section>
